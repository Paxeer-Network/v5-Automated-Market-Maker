[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
ffi = false
fuzz = { runs = 1000, max_test_rejects = 65536 }
invariant = { runs = 256, depth = 15 }
gas_reports = ["*"]
remappings = [
    "@core/=src/core/",
    "@periphery/=src/periphery/",
    "@tokens/=src/tokens/",
    "@utils/=src/utils/",
]

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 512, depth = 25 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
single_line_statement_blocks = "preserve"
sort_imports = true

[doc]
out = "docs/natspec"
title = "v5-ASAMM Protocol"

[rpc_endpoints]
paxeer = "${PAXEER_RPC_URL}"
localhost = "http://127.0.0.1:8545"
